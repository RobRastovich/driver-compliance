version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npm ci
        - npx prisma generate
    build:
      commands:
        - env | grep -E "^(DATABASE_URL|JWT_SECRET|APP_AWS_)" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
